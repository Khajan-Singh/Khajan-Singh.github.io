<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="Khajan Singh home">
      <img class="brand__icon" src="{{ '/assets/img/favicon.svg' | relative_url }}" alt="">
      <span class="brand__text">KHAJAN SINGH</span>
    </a>

    <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav__links" id="site-nav" data-nav-links>
      {% for item in site.data.nav %}
        <a class="nav__link {% if page.url == item.url %}is-active{% endif %}" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

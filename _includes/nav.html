<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand__mark" aria-hidden="true"></span>
      <span class="brand__text">Khajan Singh</span>
    </a>

    <button class="nav__toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav__links" data-nav-links>
      {% for item in site.data.nav %}
        <a class="nav__link {% if page.url == item.url %}is-active{% endif %}" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
